name: 'CD Pipeline'

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main
  #     - develop
  #   tags:
  #     - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check_changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
    outputs:
      terraform: ${{ steps.terraform.outputs.changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check terraform changes
        id: terraform
        uses: ./.github/actions/check-changes
        with:
          path: terraform

  deploy_infra:
    name: Deploy Infrastructure
    needs: [check_changes]
    if: needs.check_changes.outputs.terraform == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    environment: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && 'prod' || 'dev' }}
    env:
      ENVIRONMENT: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && 'prod' || 'dev' }}

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy Infrastructure
        uses: ./.github/actions/infra
        with:
          project_id: ${{ vars.PROJECT_ID }}
          environment: ${{ env.ENVIRONMENT }}
          region: 'europe-west1'
          action: 'apply'
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: project-service-account@${{ vars.PROJECT_ID }}.iam.gserviceaccount.com

  build_and_push:
    name: Build & Push Docker Image
    needs: [deploy_infra]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest

    environment: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && 'prod' || 'dev' }}
    env:
      ENVIRONMENT: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && 'prod' || 'dev' }}

    permissions:
      contents: 'read'
      id-token: 'write'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: project-service-account@${{ vars.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: europe-west1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: europe-west1-docker.pkg.dev/${{ vars.PROJECT_ID }}/annotate-ar-${{ env.ENVIRONMENT }}/annotations
          tags: |
            type=ref,event=branch
            type=semver,pattern={{raw}}
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max