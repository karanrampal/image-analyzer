name: 'Run Annotation Job'

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to run (defaults to latest)'
        required: false
        default: 'latest'
  # schedule:
  #   - cron: '0 6 * * 1,3,5'  # 06:00 UTC, Monday, Wednesday and Friday

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run_annotation_job:
    name: Run Cloud Run Annotation Job
    runs-on: ubuntu-latest

    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    env:
      ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run annotation job
        uses: ./.github/actions/run-cr-job
        with:
          project_id: ${{ vars.PROJECT_ID }}
          environment: ${{ env.ENVIRONMENT }}
          image: europe-west1-docker.pkg.dev/${{ vars.PROJECT_ID }}/annotate-ar-${{ env.ENVIRONMENT }}/annotations:${{ github.event_name == 'schedule' && 'latest' || inputs.image_tag }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: project-service-account@${{ vars.PROJECT_ID }}.iam.gserviceaccount.com
